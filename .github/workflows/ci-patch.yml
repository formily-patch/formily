name: Node CI

on:
  push:
    branches:
      - formily_next_patch
  pull_request:
    branches:
      - formily_next_patch

jobs:
  build:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'chore(versions)') == false
    steps:
      - uses: actions/checkout@v1
      - name: Use Node.js
        uses: actions/setup-node@v1
        with:
          node-version: 16

      - run: yarn -v
      - run: yarn --ignore-engines
      - name: ESlint
        uses: reviewdog/action-eslint@v1
        with:
          reporter: github-check
          eslint_flags: '.'
      - run: yarn build:react-all
      - run: yarn test:react-all:prod
        env:
          CI: true
          HEADLESS: false
          PROGRESS: none
          NODE_ENV: test
          NODE_OPTIONS: --max_old_space_size=4096
